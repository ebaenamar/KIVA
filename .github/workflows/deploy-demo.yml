name: Deploy Demo Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo-site/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: demo-site/package-lock.json

      - name: Install dependencies
        working-directory: demo-site
        run: npm ci

      - name: Copy assets (prebuild)
        working-directory: demo-site
        run: bash scripts/copy-assets.sh

      - name: Build
        working-directory: demo-site
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_RIVERST_API_URL: ${{ secrets.VITE_RIVERST_API_URL }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-demo
          force_orphan: true
